version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: redis_broker
    ports:
      - "6379:6379"
    restart: unless-stopped

  tg_gateway:
    build:
      context: ./tg_gateway
    container_name: tg_gateway
    network_mode: host
    dns:
      - 8.8.8.8
      - 1.1.1.1
    env_file:
      - .env
    depends_on:
      - redis
    restart: unless-stopped